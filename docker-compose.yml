services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-workplace_market}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/workplace_market}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-secret-change-in-production}
      APP_ENV: ${APP_ENV:-dev}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Workplace Market <onboarding@resend.dev>}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      EMAIL_VERIFY_API_KEY: ${EMAIL_VERIFY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - node_modules:/app/frontend/node_modules
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0"]

volumes:
  pgdata:
  node_modules:
